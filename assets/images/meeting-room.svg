<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Timeline -->
  <line x1="50" y1="100" x2="750" y2="100" stroke="blue" stroke-width="2"/>
  
  <!-- Meeting A -->
  <rect x="50" y="80" width="300" height="20" fill="lightblue"/>
  <text x="150" y="95" font-family="Arial" font-size="14" fill="black">Meeting A: 0-30</text>
  
  <!-- Meeting B -->
  <rect x="60" y="80" width="100" height="20" fill="blue"/>
  <text x="90" y="95" font-family="Arial" font-size="14" fill="white">Meeting B: 5-10</text>
  
  <!-- Meeting C -->
  <rect x="150" y="80" width="50" height="20" fill="blue"/>
  <text x="165" y="95" font-family="Arial" font-size="14" fill="white">Meeting C: 15-20</text>
  
  <!-- Conference Rooms -->
  <rect x="50" y="150" width="300" height="100" fill="lightgray"/>
  <text x="100" y="180" font-family="Arial" font-size="16" fill="black">Conference Room 1</text>
  
  <rect x="400" y="150" width="300" height="100" fill="lightgray"/>
  <text x="450" y="180" font-family="Arial" font-size="16" fill="black">Conference Room 2</text>
  
  <!-- Arrows -->
  <line x1="350" y1="100" x2="400" y2="100" stroke="blue" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="100" x2="450" y2="150" stroke="blue" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Min Heap Icon -->
  <rect x="700" y="50" width="50" height="50" fill="lightblue"/>
  <text x="710" y="80" font-family="Arial" font-size="12" fill="black">Min Heap</text>
  <text x="710" y="95" font-family="Arial" font-size="12" fill="black">End Times</text>
  
  <!-- Steps -->
  <text x="50" y="300" font-family="Arial" font-size="16" fill="black">Sort intervals</text>
  <text x="50" y="320" font-family="Arial" font-size="16" fill="black">↓</text>
  <text x="50" y="340" font-family="Arial" font-size="16" fill="black">Check earliest ending meeting</text>
  <text x="50" y="360" font-family="Arial" font-size="16" fill="black">↓</text>
  <text x="50" y="380" font-family="Arial" font-size="16" fill="black">Reuse room if possible</text>
  <text x="50" y="400" font-family="Arial" font-size="16" fill="black">↓</text>
  <text x="50" y="420" font-family="Arial" font-size="16" fill="black">Allocate new room otherwise</text>
  <text x="50" y="440" font-family="Arial" font-size="16" fill="black">↓</text>
  <text x="50" y="460" font-family="Arial" font-size="16" fill="black">Answer = Maximum heap size</text>
  
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="blue"/>
    </marker>
  </defs>
</svg>
